services:
  backend:
    build:
      context:
        ./backend
      dockerfile: 
        Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context:
        ./frontend
      dockerfile: 
        Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules